name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md

  link-check:
    name: link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --exclude-path LICENSE
            --exclude-path COPYRIGHT
            './**/*.md'
          fail: true

  python-gates:
    name: Python quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: flake8
        # Scope explicitly to source and test dirs so we never walk into
        # any local .venv that might exist in the runner image.
        run: flake8 tooling/src tooling/tests

      - name: pylint
        # Build dir list from those that actually have .py files;
        # avoids "no .py in directory" errors on empty trees.
        run: |
          DIRS=()
          for d in tooling/src tooling/tests; do
            if [ -n "$(find "$d" -type f -name '*.py' 2>/dev/null)" ]; then
              DIRS+=("$d")
            fi
          done
          if [ ${#DIRS[@]} -gt 0 ]; then
            pylint --rcfile=pylintrc "${DIRS[@]}"
          else
            echo "no .py files yet; pylint skipped"
          fi

      - name: mypy --strict
        run: |
          DIRS=()
          for d in tooling/src tooling/tests; do
            if [ -n "$(find "$d" -type f -name '*.py' 2>/dev/null)" ]; then
              DIRS+=("$d")
            fi
          done
          if [ ${#DIRS[@]} -gt 0 ]; then
            mypy "${DIRS[@]}"
          else
            echo "no .py files yet; mypy skipped"
          fi

      - name: pytest
        run: |
          T=$(find tooling/tests -type f -name 'test_*.py' 2>/dev/null)
          if [ -n "$T" ]; then
            pytest
          else
            echo "no tests yet; pytest skipped"
          fi

      - name: ontology JSON in sync with YAML
        # The committed JSON snapshot must match what the build tool
        # would produce from the current YAML. Catches "forgot to
        # rebuild" before it lands on main. (D009 build-tool gate.)
        run: |
          if [ -f ontology/ai-targeted-isa.yaml ]; then
            build-ai-isa-ontology --check
          else
            echo "no ontology YAML yet; sync check skipped"
          fi

      - name: ontology audit
        # Resolve every ref in the built JSON against the actual
        # repo and apply consistency rules. Non-zero on any gap.
        # (D010 audit-tool gate.) Skipped before the JSON exists.
        run: |
          if [ -f ontology/ai-targeted-isa.json ]; then
            audit-ai-isa-ontology
          else
            echo "no ontology JSON yet; audit skipped"
          fi
